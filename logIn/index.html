<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header dir="rtl">
        <button class="back">بازگشت</button>
    </header>
    <main>
      <!-- From Uiverse.io by VIJAYAACHI -->
      <div class="form-container">
        <p class="title">ورود</p>
        <form class="form">
          <div class="input-group">
            <label for="phone">نام کاربری</label>
            <input placeholder="" id="phone" name="phone" type="phone" />
            <label for="email">رمز عبور</label>
            <input placeholder="" id="email" name="email" type="email" />
          </div>
          <button style="margin-top: 6%" class="sign">ورود</button>
        </form>
        <div class="social-message">
          <div class="line"></div>
          <p class="message">نام کاربری و رمز عبور توسط مسئولین فرتاک تعیین میشود</p>
          <div class="line"></div>
        </div>
      </div>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
